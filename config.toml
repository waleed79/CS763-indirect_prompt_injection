# RAG Pipeline Configuration — Phase 2.1
# All parameters used by the pipeline are centralized here for RAG-05 reproducibility.

[pipeline]
seed = 42
top_k = 5
corpus_size = 1000

[chunking]
chunk_words = 200       # ~256 MiniLM wordpiece tokens (ratio ~1.3)
overlap_words = 25      # ~32 tokens overlap

[embedding]
# nomic-ai/nomic-embed-text-v1.5: MTEB 62.4, 8192-token context, 137M params, CPU-compatible
# HuggingFace model ID (loaded via sentence-transformers with trust_remote_code=True)
# Upgraded from all-MiniLM-L6-v2 (MTEB 56.3, 256-token context) in Phase 2.3
# all-MiniLM-L6-v2 is kept as the legacy baseline for EVAL-06 transferability (Phase 3.3)
# NOTE: Ollama also has "nomic-embed-text" but the retriever uses sentence-transformers, not Ollama
model = "nomic-ai/nomic-embed-text-v1.5"

[llm]
model = "mistral:7b"
ollama_host = "http://localhost:11434"

[storage]
chroma_path = ".chroma"
collection = "nq_clean_v2"

[logging]
log_path = "logs/retrieval.jsonl"
